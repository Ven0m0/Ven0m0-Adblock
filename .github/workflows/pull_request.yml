name: Code quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true
      - name: Run JavaScript quality checks
        run: bun run lint:js
      - name: Run formatting checks
        run: bun run format:check
