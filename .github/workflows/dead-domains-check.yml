name: Dead Domains Check

env:
  NODE_VERSION: 20

on:
  schedule:
    - cron: "0 8 * * 1"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/dead-domains-check.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  dead-domains-check:
    name: Run Dead Domains
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Install Dependencies
        run: |
          bun install
          npm install -g fop-cli
          bun add -g @adguard/dead-domains-linter

      - name: Find Filter Files
        id: filter-files
        run: |
          adblock_files=$(find lists/adblock -type f -name "*.txt" 2>/dev/null | tr '\n' ' ')
          hostlist_files=$(find lists/hostlist -type f -name "*.txt" 2>/dev/null | tr '\n' ' ')
          echo "adblock_files=$adblock_files" >> $GITHUB_OUTPUT
          echo "hostlist_files=$hostlist_files" >> $GITHUB_OUTPUT

      - name: Export Dead Domains
        run: |
          mkdir -p dead-domains
          for file in ${{ steps.filter-files.outputs.adblock_files }} ${{ steps.filter-files.outputs.hostlist_files }}; do
            if [[ -f "$file" ]]; then
              mise exec -- bunx dead-domains-linter --export "dead-domains/$(basename "$file").txt" --input "$file" 2>/dev/null || true
            fi
          done
          cat dead-domains/*.txt 2>/dev/null | sort -u > dead-domains.txt || true

      - name: Read Dead Domains
        id: read-dead-domains
        uses: actions/github-script@v9
        with:
          script: |
            const { readFile } = require('fs').promises;

            let deadDomains = [];
            try {
              const content = await readFile('dead-domains.txt', 'utf8');
              deadDomains = content.split(/\r?\n/).filter(Boolean);
            } catch (e) {
              core.info('No dead domains file found');
            }

            for (const domain of deadDomains) {
              core.warning(`Possible Dead Domain: ${domain}`);
            }

            core.setOutput('has_dead_domains', deadDomains.length > 0 ? 'true' : 'false');
            core.setOutput('dead_domains', deadDomains);

      - name: Close Pull Request(s)
        uses: actions/github-script@v9
        with:
          script: |
            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const previousPullRequests = pullRequests.filter(pullRequest => {
              const branchName = pullRequest.head.ref;
              const isAutomated = branchName.startsWith('feature/dead-domains');
              const isBot = pullRequest.user.login === 'github-actions[bot]';

              return isAutomated && isBot;
            });

            for (const previousPullRequest of previousPullRequests) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: previousPullRequest.number,
                state: 'closed',
              });

              core.info(`Closed Pull Request #${previousPullRequest.number}`);
            }

            for (const previousPullRequest of previousPullRequests) {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${previousPullRequest.head.ref}`,
              });

              core.info(`Deleted Branch ${previousPullRequest.head.ref}`);
            }

      - name: Create New Branch
        if: steps.read-dead-domains.outputs.has_dead_domains == 'true'
        id: create-branch
        run: |
          branch_name="feature/dead-domains"
          git checkout -b $branch_name

          echo "branch_name=$branch_name" >> $GITHUB_OUTPUT

      - name: Remove Dead Domains
        if: steps.read-dead-domains.outputs.has_dead_domains == 'true'
        run: |
          for file in ${{ steps.filter-files.outputs.adblock_files }} ${{ steps.filter-files.outputs.hostlist_files }}; do
            if [[ -f "$file" ]]; then
              mise exec -- bunx dead-domains-linter --auto --import "dead-domains/$(basename "$file").txt" --input "$file" --output "$file" 2>/dev/null || true
            fi
          done

      - name: Update Checksum and Date
        if: steps.read-dead-domains.outputs.has_dead_domains == 'true'
        run: |
          for file in lists/adblock/*.txt lists/hostlist/*.txt; do
            if [[ -f "$file" ]]; then
              if grep -q "^! Version:" "$file"; then
                ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                sed -i "s/^! Version:.*/! Version: $(git rev-parse --short HEAD)/" "$file"
                sed -i "s/^! Last Modified:.*/! Last Modified: $ts/" "$file" 2>/dev/null || true
              fi
            fi
          done

      - name: Stage Changes
        if: steps.read-dead-domains.outputs.has_dead_domains == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -f dead-domains.txt ]] && ! grep -q "dead-domains.txt" .gitignore 2>/dev/null; then
            echo "dead-domains.txt" >> .gitignore
            echo "dead-domains/" >> .gitignore
            git add .gitignore
          fi

          git add -A

      - name: Commit and Push
        if: steps.read-dead-domains.outputs.has_dead_domains == 'true'
        run: |
          git commit -m "fix(filters): remove dead domains"
          git push --set-upstream origin ${{ steps.create-branch.outputs.branch_name }}

      - name: Create Pull Request
        if: steps.read-dead-domains.outputs.has_dead_domains == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'fix(filters): remove dead domains',
              head: '${{ steps.create-branch.outputs.branch_name }}',
              base: context.ref.replace('refs/heads/', ''),
              body: [
                'This is an automated pull request.',
                '',
                'Please note that this is an automated check and some low-traffic websites may be incorrectly marked as dead.',
                '',
                'For more information, see https://github.com/AdguardTeam/DeadDomainsLinter/blob/master/README.md',
              ].join('\n'),
            });

            core.info(`Pull Request #${pullRequest.number} Opened`);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullRequest.number,
              labels: ['dead website'],
            });
